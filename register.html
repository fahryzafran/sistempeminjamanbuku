<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PustakaSYS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">

  <div class="auth-card">

    <div class="auth-brand">
      <h1>Daftar Akun</h1>
      <p>Buat akun PustakaSYS</p>
    </div>

    <form id="registerForm" class="auth-form">

      <div class="form-group">
        <label>Nama Lengkap</label>
        <input
          type="text"
          id="registerName"
          required
          placeholder="Masukkan nama lengkap"
        >
      </div>

      <div class="form-group">
        <label>Email Aktif</label>
        <input
          type="email"
          id="registerEmail"
          required
          placeholder="Masukkan email aktif"
        >
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          id="registerPassword"
          required
          placeholder="Masukkan password"
        >
      </div>

      <div class="card" style="padding:16px;">
        <small>
          Password minimal 8 karakter,
          harus mengandung huruf besar,
          huruf kecil, angka, dan simbol.
          Gunakan email aktif untuk reset password.
        </small>
      </div>

      <button
        type="submit"
        class="btn btn-primary full-btn"
      >
        Daftar
      </button>

    </form>

    <button
      id="googleRegisterBtn"
      class="btn btn-google full-btn"
      style="margin-top:16px;"
    >
      Daftar dengan Google
    </button>

    <p class="auth-footer">
      Sudah punya akun?
      <a href="login.html">Login</a>
    </p>

  </div>

</div>

<script type="module" src="app.js"></script>

<script type="module">
document
  .getElementById("registerForm")
  .addEventListener("submit", async (e) => {
    e.preventDefault();

    const name =
      document.getElementById("registerName")
      .value.trim();

    const email =
      document.getElementById("registerEmail")
      .value.trim();

    const password =
      document.getElementById("registerPassword")
      .value;

    try {
      await window.registerUser(
        name,
        email,
        password
      );

      window.showToast(
        "Registrasi berhasil"
      );

      setTimeout(() => {
        window.location.href =
          "member.html";
      }, 1000);

    } catch (error) {
      console.error(error);

      window.showToast(
        error.message,
        "error"
      );
    }
  });

document
  .getElementById("googleRegisterBtn")
  .addEventListener("click", async () => {
    try {
      await window.loginWithGoogle();

      window.showToast(
        "Login Google berhasil"
      );

      setTimeout(() => {
        window.location.href =
          "member.html";
      }, 1000);

    } catch (error) {
      console.error(error);

      window.showToast(
        "Google login gagal",
        "error"
      );
    }
  });
</script>

</body>
</html>
