<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Buku</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      PerpusDigital
    </a>

    <div class="dynamic-navbar"></div>
  </div>
</nav>

<section class="container">
  <div class="profile-card">
    <h1 class="section-title">
      Edit Buku
    </h1>

    <form id="editBookForm" class="auth-form">

      <div class="form-group">
        <label>Judul Buku</label>
        <input type="text" id="title" required>
      </div>

      <div class="form-group">
        <label>Penulis</label>
        <input type="text" id="author" required>
      </div>

      <div class="form-group">
        <label>Kategori</label>
        <input type="text" id="category">
      </div>

      <div class="form-group">
        <label>ISBN</label>
        <input type="text" id="isbn">
      </div>

      <div class="form-group">
        <label>Tahun</label>
        <input type="number" id="year">
      </div>

      <div class="form-group">
        <label>Stok</label>
        <input type="number" id="stock" required>
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="description" rows="5"></textarea>
      </div>

      <div class="form-group">
        <label>URL Cover Buku</label>
        <input
          type="url"
          id="coverUrl"
          placeholder="https://example.com/cover.jpg"
        >

        <img
          id="coverPreview"
          style="width: 220px; margin-top: 20px; border-radius: 12px;"
        >
      </div>

      <button
        type="submit"
        class="btn btn-primary full-btn"
      >
        Update Buku
      </button>

    </form>
  </div>
</section>

<script type="module" src="app.js"></script>

<script type="module">
await window.protectPage("admin");
await window.renderNavbar();

const params = new URLSearchParams(window.location.search);
const bookId = params.get("id");

if (!bookId) {
  window.showToast("ID buku tidak ditemukan", "error");
  setTimeout(() => {
    window.location.href = "books.html";
  }, 1500);
}

const coverUrlInput =
  document.getElementById("coverUrl");

const preview =
  document.getElementById("coverPreview");

preview.style.display = "none";

coverUrlInput.addEventListener("input", () => {
  const url = coverUrlInput.value.trim();

  if (!url) {
    preview.style.display = "none";
    return;
  }

  preview.src = url;
  preview.style.display = "block";
});

/* load data buku */
const book =
  await window.getBookById(bookId);

document.getElementById("title").value =
  book.title || "";

document.getElementById("author").value =
  book.author || "";

document.getElementById("category").value =
  book.category || "";

document.getElementById("isbn").value =
  book.isbn || "";

document.getElementById("year").value =
  book.year || "";

document.getElementById("stock").value =
  book.stock || "";

document.getElementById("description").value =
  book.description || "";

coverUrlInput.value =
  book.coverUrl || "";

if (book.coverUrl) {
  preview.src = book.coverUrl;
  preview.style.display = "block";
}

document
  .getElementById("editBookForm")
  .addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      await window.updateBook(bookId, {
        title:
          document.getElementById("title").value.trim(),

        author:
          document.getElementById("author").value.trim(),

        category:
          document.getElementById("category").value.trim(),

        isbn:
          document.getElementById("isbn").value.trim(),

        year:
          Number(document.getElementById("year").value),

        stock:
          Number(document.getElementById("stock").value),

        description:
          document.getElementById("description").value.trim(),

        coverUrl:
          coverUrlInput.value.trim()
      });

      window.showToast("Buku berhasil diupdate");

      setTimeout(() => {
        window.location.href = "books.html";
      }, 1000);

    } catch (error) {
      console.error(error);
      window.showToast(error.message, "error");
    }
  });
</script>

</body>
</html>
