<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saya-PustakaSYS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      PustakaSYS
    </a>

    <div class="dynamic-navbar"></div>
  </div>
</nav>

<section class="container">
  <div class="profile-card">

    <h1 class="section-title">
      Profil Saya
    </h1>

    <form id="profileForm" class="auth-form">

      <div class="form-group">
        <label>Nama</label>
        <input
          type="text"
          id="profileName"
          required
        >
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          id="profileEmail"
          disabled
        >
      </div>

      <div class="form-group">
        <label>Role</label>
        <input
          type="text"
          id="profileRole"
          disabled
        >
      </div>

      <button
        type="submit"
        class="btn btn-primary full-btn"
      >
        Update Profil
      </button>

    </form>

    <div style="height:24px;"></div>

    <form id="passwordForm" class="auth-form">
      <div class="form-group">
        <label>Password Baru</label>
        <input
          type="password"
          id="newPassword"
          required
        >
      </div>

      <button
        type="submit"
        class="btn btn-secondary full-btn"
      >
        Ganti Password
      </button>
    </form>

    <div style="height:24px;"></div>

    <button
      onclick="logoutUser()"
      class="btn btn-danger full-btn"
    >
      Logout
    </button>

  </div>
</section>

<script type="module" src="app.js"></script>

<script type="module">
await window.protectAuthOnly();

await window.renderNavbar();

const user =
  await window.getCurrentUserData();

document.getElementById("profileName")
  .value = user.name || "";

document.getElementById("profileEmail")
  .value = user.email || "";

document.getElementById("profileRole")
  .value = user.role || "";

document
  .getElementById("profileForm")
  .addEventListener(
    "submit",
    async (e) => {
      e.preventDefault();

      try {
        const name =
          document.getElementById(
            "profileName"
          ).value.trim();

        await window.updateProfileName(name);

        window.showToast(
          "Profil diperbarui"
        );

      } catch (error) {
        window.showToast(
          error.message,
          "error"
        );
      }
    }
  );

document
  .getElementById("passwordForm")
  .addEventListener(
    "submit",
    async (e) => {
      e.preventDefault();

      try {
        const password =
          document.getElementById(
            "newPassword"
          ).value;

        await window.changePassword(
          password
        );

        window.showToast(
          "Password berhasil diganti"
        );

      } catch (error) {
        window.showToast(
          error.message,
          "error"
        );
      }
    }
  );
</script>

</body>
</html>
