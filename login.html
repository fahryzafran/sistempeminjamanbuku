<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login-PustakaSYS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <h1>Login</h1>
        <p>Masuk ke akun PustakaSYS kamu.</p>
      </div>

      <form
        id="loginForm"
        class="auth-form"
      >
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Masukkan email"
            required
          >
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          >
        </div>

        <button
          type="button"
          class="link-btn"
          onclick="resetPassword()"
        >
          Lupa password?
        </button>

        <button
          type="submit"
          class="btn btn-primary full-btn"
        >
          Login
        </button>

        <button
          type="button"
          onclick="window.loginWithGoogle()"
          class="btn btn-google full-btn"
        >
          Masuk dengan Google
        </button>
      </form>

      <div class="auth-footer">
        Belum punya akun?
        <a href="register.html">Daftar</a>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>

<script>
document
  .getElementById("loginForm")
  .addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      await window.loginUser(
        document.getElementById("email").value,
        document.getElementById("password").value
      );

      window.showToast("Login berhasil");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);

    } catch (error) {
      console.error(error);

      window.showToast(
        "Email atau password salah",
        "error"
      );
    }
  });

async function resetPassword() {
  const email =
    document.getElementById("email").value;

  if (!email) {
    window.showToast(
      "Isi email dulu",
      "error"
    );
    return;
  }

  try {
    await window.resetUserPassword(email);

    window.showToast(
      "Email reset password dikirim"
    );

  } catch (error) {
    console.error(error);

    window.showToast(
      "Gagal mengirim email reset",
      "error"
    );
  }
}
</script>
  
</body>
</html>
